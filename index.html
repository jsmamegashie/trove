<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trove — Your Personal Discovery List</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root {
  --obsidian:    #131313;
  --obsidian-2:  #1c1c1c;
  --obsidian-3:  #252525;
  --obsidian-4:  #303030;
  --teal:        #0d6b53;
  --teal-mid:    #1a9470;
  --teal-bright: #22c497;
  --teal-pale:   #0a3d30;
  --teal-glow:   rgba(13,107,83,0.14);
  --white:       #ffffff;
  --off-white:   #eeecea;
  --muted:       #555;
  --muted-2:     #777;
  --border:      rgba(255,255,255,0.07);
  --border-h:    rgba(255,255,255,0.13);
  --card:        #1c1c1c;
  --radius:      14px;
  --radius-sm:   9px;
  --display:     'Cormorant Garamond', Georgia, serif;
  --body:        'DM Sans', system-ui, sans-serif;
  --ease:        0.17s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--obsidian);color:var(--white);
  font-family:var(--body);min-height:100vh;
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--obsidian-4);border-radius:4px;}

.app{max-width:740px;margin:0 auto;padding-bottom:80px;}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(19,19,19,0.97);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 22px;
}
.header-top{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:16px 0 10px;gap:12px;
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.logo-name{font-family:var(--display);font-size:25px;font-weight:500;color:var(--white);letter-spacing:.4px;}
.header-stats{display:flex;gap:16px;flex-shrink:0;}
.stat{text-align:center;}
.stat-num{font-family:var(--display);font-size:19px;font-weight:500;color:var(--teal-bright);line-height:1;display:block;}
.stat-label{font-size:9px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.8px;display:block;margin-top:2px;}

/* SEARCH */
.search-wrap{padding:0 0 8px;position:relative;}
.search-input{
  width:100%;background:var(--obsidian-3);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--white);font-size:13px;font-family:var(--body);
  padding:9px 36px 9px 14px;outline:none;
  transition:border-color var(--ease);
}
.search-input:focus{border-color:var(--teal-mid);}
.search-input::placeholder{color:var(--muted);}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:transparent;border:none;color:var(--muted);
  font-size:15px;cursor:pointer;line-height:1;display:none;
}
.search-clear.vis{display:block;}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;padding:0 0 13px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.pill{
  white-space:nowrap;padding:5px 13px;border-radius:20px;
  font-size:12px;font-family:var(--body);cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted-2);
  transition:all var(--ease);flex-shrink:0;
}
.pill:hover{border-color:var(--teal-mid);color:var(--white);}
.pill.active{background:var(--teal);border-color:var(--teal);color:var(--white);}

/* ADD SECTION */
.add-section{
  margin:18px 22px 0;background:var(--obsidian-2);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;transition:border-color var(--ease);
}
.add-section:focus-within{border-color:var(--teal);}
.add-row{display:flex;gap:8px;margin-bottom:9px;}
.add-input{
  flex:1;background:var(--obsidian-3);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--white);
  font-size:13px;font-family:var(--body);
  padding:10px 13px;outline:none;transition:border-color var(--ease);
}
.add-input:focus{border-color:var(--teal-mid);}
.add-input::placeholder{color:var(--muted);}
.add-btn{
  background:var(--teal);border:none;border-radius:var(--radius-sm);
  color:var(--white);font-size:13px;font-weight:500;font-family:var(--body);
  padding:10px 18px;cursor:pointer;white-space:nowrap;
  transition:background var(--ease);
}
.add-btn:hover{background:var(--teal-mid);}
.add-btn:active{transform:scale(.98);}
.add-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.meta-input{
  flex:2;min-width:130px;background:var(--obsidian-3);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--white);font-size:12px;font-family:var(--body);
  padding:7px 11px;outline:none;transition:border-color var(--ease);
}
.meta-input:focus{border-color:var(--teal-mid);}
.meta-input::placeholder{color:var(--muted);}
.cat-select{
  background:var(--obsidian-3);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--white);
  font-size:12px;font-family:var(--body);
  padding:7px 11px;outline:none;cursor:pointer;
  transition:border-color var(--ease);
}
.cat-select:focus{border-color:var(--teal-mid);}
.cat-select option{background:#1c1c1c;}
.ai-badge{
  font-size:10px;color:var(--teal-bright);
  border:1px solid var(--teal-pale);border-radius:20px;
  padding:3px 10px;white-space:nowrap;
  background:var(--teal-glow);letter-spacing:.3px;
}
.mgr-btn{
  background:transparent;border:1px dashed var(--border);
  border-radius:var(--radius-sm);color:var(--muted);
  font-size:11px;font-family:var(--body);
  padding:5px 11px;cursor:pointer;
  transition:all var(--ease);white-space:nowrap;
}
.mgr-btn:hover{border-color:var(--teal-mid);color:var(--teal-bright);}

/* TOOLBAR */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px 0;flex-wrap:wrap;gap:8px;
}
.section-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.1px;}
.toolbar-actions{display:flex;gap:6px;}
.tool-btn{
  font-size:11px;padding:5px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:transparent;
  color:var(--muted-2);cursor:pointer;font-family:var(--body);
  transition:all var(--ease);
}
.tool-btn:hover{border-color:var(--teal-mid);color:var(--teal-bright);}

/* LIST */
.list{padding:12px 22px 0;display:flex;flex-direction:column;gap:8px;}

/* EMPTY */
.empty{text-align:center;padding:64px 22px;color:var(--muted);}
.empty svg{display:block;margin:0 auto 18px;opacity:.18;}
.empty h3{font-family:var(--display);font-size:21px;font-weight:400;color:var(--muted-2);margin-bottom:6px;}
.empty p{font-size:13px;line-height:1.7;}

/* CARD */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:border-color var(--ease),opacity var(--ease);
  animation:cardIn .22s ease forwards;
}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:var(--border-h);}
.card.done{opacity:.62;border-left:3px solid var(--teal);}
.card.done .card-title{text-decoration:line-through;color:var(--muted);}

.card-main{padding:13px 15px;display:flex;gap:11px;align-items:flex-start;}

.check-btn{
  width:21px;height:21px;border-radius:50%;
  border:1.5px solid var(--border-h);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--ease);flex-shrink:0;margin-top:1px;
}
.check-btn:hover{border-color:var(--teal-bright);background:var(--teal-glow);}
.check-btn.checked{background:var(--teal);border-color:var(--teal);}
.check-svg{display:none;}
.check-btn.checked .check-svg{display:block;}

.card-body{flex:1;min-width:0;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px;}
.card-title{font-size:14px;font-weight:500;color:var(--white);line-height:1.4;word-break:break-word;}
.card-summary{font-size:12px;color:var(--muted-2);line-height:1.6;margin-bottom:7px;}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cat-tag{
  font-size:10px;padding:2px 9px;border-radius:20px;
  background:var(--teal-pale);color:var(--teal-bright);font-weight:500;
  cursor:pointer;transition:background var(--ease);
}
.cat-tag:hover{background:var(--teal);color:var(--white);}
.date-tag{font-size:10px;color:var(--muted);}
.link-tag{font-size:10px;color:var(--teal-mid);text-decoration:none;word-break:break-all;transition:color var(--ease);}
.link-tag:hover{color:var(--teal-bright);text-decoration:underline;}
.card-actions{display:flex;gap:3px;flex-shrink:0;}
.icon-btn{
  background:transparent;border:none;color:var(--muted);
  cursor:pointer;padding:4px 5px;border-radius:5px;
  font-size:13px;transition:all var(--ease);line-height:1;
}
.icon-btn:hover{color:var(--white);background:var(--obsidian-4);}
.icon-btn.del:hover{color:#f09595;}

.ai-loading{font-size:11px;color:var(--teal-mid);padding:4px 0 0;display:flex;align-items:center;gap:6px;}
.dots{display:flex;gap:3px;}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--teal-mid);animation:dp 1.3s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* NOTES */
.card-notes{border-top:1px solid var(--border);padding:11px 15px;background:rgba(0,0,0,.14);}
.notes-label{font-size:9px;color:var(--teal-mid);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.notes-ta{
  width:100%;background:transparent;border:none;
  color:var(--off-white);font-size:13px;font-family:var(--body);
  resize:none;outline:none;line-height:1.7;min-height:52px;
}
.notes-ta::placeholder{color:var(--muted);font-style:italic;}
.notes-view{font-size:13px;color:var(--off-white);line-height:1.7;font-style:italic;cursor:pointer;opacity:.82;}
.notes-view:hover{opacity:1;}

/* MODAL */
.backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.76);z-index:500;
  align-items:center;justify-content:center;
  padding:24px;backdrop-filter:blur(4px);
}
.backdrop.open{display:flex;}
.modal{
  background:var(--obsidian-2);border:1px solid var(--border-h);
  border-radius:var(--radius);padding:24px;
  width:100%;max-width:390px;
  animation:mIn .18s ease;
}
@keyframes mIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-family:var(--display);font-size:20px;font-weight:500;color:var(--white);}
.modal-x{background:transparent;border:none;color:var(--muted);font-size:19px;cursor:pointer;padding:2px 6px;border-radius:5px;transition:color var(--ease);}
.modal-x:hover{color:var(--white);}
.modal-in{
  width:100%;background:var(--obsidian-3);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--white);
  font-size:13px;font-family:var(--body);
  padding:9px 13px;outline:none;margin-bottom:9px;
  transition:border-color var(--ease);
}
.modal-in:focus{border-color:var(--teal-mid);}
.modal-in::placeholder{color:var(--muted);}
.modal-add{
  width:100%;background:var(--teal);border:none;
  border-radius:var(--radius-sm);color:var(--white);
  font-size:13px;font-family:var(--body);font-weight:500;
  padding:9px;cursor:pointer;margin-bottom:14px;
  transition:background var(--ease);
}
.modal-add:hover{background:var(--teal-mid);}
.cats-list{display:flex;flex-direction:column;gap:5px;max-height:230px;overflow-y:auto;margin-bottom:13px;}
.cat-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 11px;background:var(--obsidian-3);
  border-radius:var(--radius-sm);border:1px solid var(--border);
}
.cat-row-name{font-size:13px;color:var(--white);}
.cat-locked{font-size:10px;color:var(--muted);margin-left:6px;}
.cat-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;transition:color var(--ease);}
.cat-del:hover{color:#f09595;}
.modal-done{
  width:100%;background:transparent;border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--muted-2);
  font-size:13px;font-family:var(--body);padding:8px;cursor:pointer;
  transition:all var(--ease);
}
.modal-done:hover{border-color:var(--teal);color:var(--white);}

/* TOAST */
.toast{
  position:fixed;bottom:26px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--obsidian-3);border:1px solid var(--teal-pale);
  color:var(--teal-bright);font-size:12px;padding:9px 20px;
  border-radius:20px;z-index:1000;
  transition:transform .28s ease;
  pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:580px){
  .header,.toolbar{padding-left:14px;padding-right:14px;}
  .add-section{margin-left:14px;margin-right:14px;}
  .list{padding-left:14px;padding-right:14px;}
  .header-stats{gap:12px;}
  .stat-num{font-size:16px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <a class="logo" href="#">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <rect x="3" y="12" width="20" height="12" rx="3" fill="#0d6b53" stroke="#1a9470" stroke-width="1"/>
          <rect x="2" y="6" width="22" height="8" rx="3" fill="#1a9470" stroke="#22c497" stroke-width=".8"/>
          <rect x="10" y="15" width="6" height="6" rx="1.5" fill="#22c497"/>
          <circle cx="13" cy="18" r="1.4" fill="#0d6b53"/>
          <polygon points="24,5 27,9 24,13 21,9" fill="#22c497" opacity=".65"/>
        </svg>
        <span class="logo-name">Trove</span>
      </a>
      <div class="header-stats">
        <div class="stat"><span class="stat-num" id="s-total">0</span><span class="stat-label">Saved</span></div>
        <div class="stat"><span class="stat-num" id="s-done">0</span><span class="stat-label">Tried</span></div>
        <div class="stat"><span class="stat-num" id="s-left">0</span><span class="stat-label">To try</span></div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
      <input class="search-input" id="search" placeholder="Search your Trove — titles, notes, categories, links…" autocomplete="off" oninput="onSearch(this.value)"/>
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>

    <!-- FILTER PILLS -->
    <div class="filter-bar" id="filter-bar"></div>
  </header>

  <!-- ADD -->
  <div class="add-section">
    <div class="add-row">
      <input class="add-input" id="link-in" placeholder="Paste a link or describe something to try…" autocomplete="off"/>
      <button class="add-btn" onclick="addItem()">+ Add</button>
    </div>
    <div class="add-meta">
      <input class="meta-input" id="title-in" placeholder="Title (AI will generate if blank)"/>
      <select class="cat-select" id="cat-sel"></select>
      <button class="mgr-btn" onclick="openModal()">⊕ Categories</button>
      <span class="ai-badge">✦ Gemini AI</span>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <span class="section-label" id="list-label">Your collection</span>
    <div class="toolbar-actions">
      <button class="tool-btn" onclick="backupData()">⬇ Backup</button>
      <button class="tool-btn" onclick="triggerRestore()">⬆ Restore</button>
      <input type="file" id="restore-file" accept=".json" style="display:none" onchange="restoreData(this)"/>
    </div>
  </div>

  <!-- LIST -->
  <div class="list" id="list"></div>

</div>

<!-- CATEGORY MODAL -->
<div class="backdrop" id="backdrop" onclick="backdropClick(event)">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title">Categories</span>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <input class="modal-in" id="new-cat" placeholder="New category name…" onkeydown="if(event.key==='Enter')addCat()"/>
    <button class="modal-add" onclick="addCat()">Add category</button>
    <div class="cats-list" id="cats-list"></div>
    <button class="modal-done" onclick="closeModal()">Done</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const GEMINI_KEY = 'AIzaSyAydMQLU7gCr89uiIpLPrFP_kstS7CBGfY';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

const DEFAULT_CATS = [
  'Work','Travel','To Try','Fitness','DIY',
  'Beauty','Recipes','Food','Fashion','AI',
  'Technology','Entertainment','Health','Shopping'
];

function load(){
  try{ const s=localStorage.getItem('trove_v4'); if(s) return JSON.parse(s); }catch(e){}
  return {items:[],cats:[...DEFAULT_CATS]};
}
function save(){ try{ localStorage.setItem('trove_v4',JSON.stringify(state)); }catch(e){} }

let state       = load();
let activeFilter= 'All';
let searchQuery = '';
let editingNotes= null;

function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function shortUrl(u){ try{ return new URL(u).hostname.replace('www.',''); }catch(e){ return u.slice(0,28); } }
function fmtDate(ts){ return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600);
}

function render(){ renderStats(); renderFilters(); renderCatSelect(); renderList(); }

function renderStats(){
  const tot =state.items.length;
  const done=state.items.filter(i=>i.done).length;
  document.getElementById('s-total').textContent=tot;
  document.getElementById('s-done').textContent =done;
  document.getElementById('s-left').textContent =tot-done;
}

function renderFilters(){
  const bar=document.getElementById('filter-bar');
  const pills=['All','To try','Tried',...state.cats];
  bar.innerHTML=pills.map(f=>
    `<button class="pill${activeFilter===f?' active':''}" onclick="setFilter(${JSON.stringify(f)})">${esc(f)}</button>`
  ).join('');
}

function renderCatSelect(){
  const sel=document.getElementById('cat-sel');
  const cur=sel.value;
  sel.innerHTML=state.cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  if(state.cats.includes(cur)) sel.value=cur;
}

function getFiltered(){
  let items=state.items;
  if(activeFilter==='To try')  items=items.filter(i=>!i.done);
  else if(activeFilter==='Tried') items=items.filter(i=>i.done);
  else if(activeFilter!=='All')   items=items.filter(i=>i.cat===activeFilter);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    items=items.filter(i=>
      (i.title||'').toLowerCase().includes(q)||
      (i.summary||'').toLowerCase().includes(q)||
      (i.url||'').toLowerCase().includes(q)||
      (i.notes||'').toLowerCase().includes(q)||
      (i.cat||'').toLowerCase().includes(q)
    );
  }
  return items;
}

function renderList(){
  const el   =document.getElementById('list');
  const label=document.getElementById('list-label');
  const items=getFiltered();
  const base =activeFilter==='All'?'Your collection':activeFilter;
  label.textContent=`${base} · ${items.length} item${items.length!==1?'s':''}`;

  if(!items.length){
    const isSrch=searchQuery.length>0;
    el.innerHTML=`<div class="empty">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <rect x="9" y="22" width="34" height="24" rx="5" stroke="white" stroke-width="1.4"/>
        <rect x="7" y="13" width="38" height="12" rx="5" stroke="white" stroke-width="1.4"/>
        <rect x="21" y="30" width="10" height="9" rx="2.5" stroke="white" stroke-width="1.4"/>
      </svg>
      <h3>${isSrch?'No results found':'Your Trove is empty'}</h3>
      <p>${isSrch?`Nothing matched "<em>${esc(searchQuery)}</em>".<br>Try a different search.`:'Paste a link or describe something<br>you want to try.'}</p>
    </div>`;
    return;
  }
  el.innerHTML=items.map(cardHTML).join('');
}

function cardHTML(item){
  const editing =editingNotes===item.id;
  const hasNotes=item.notes&&item.notes.trim();
  return `<div class="card${item.done?' done':''}" id="card-${item.id}">
    <div class="card-main">
      <button class="check-btn${item.done?' checked':''}" onclick="toggleDone('${item.id}')" title="${item.done?'Undo':'Mark as tried'}">
        <svg class="check-svg" width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="card-body">
        <div class="card-top">
          <div class="card-title">${esc(item.title||item.url)}</div>
          <div class="card-actions">
            <button class="icon-btn" onclick="toggleNotes('${item.id}')" title="Notes">✏</button>
            <button class="icon-btn del" onclick="deleteItem('${item.id}')" title="Delete">✕</button>
          </div>
        </div>
        ${item.summary?`<div class="card-summary">${esc(item.summary)}</div>`:''}
        <div class="card-meta">
          ${item.cat?`<span class="cat-tag" onclick="setFilter(${JSON.stringify(item.cat)})" title="Filter by ${esc(item.cat)}">${esc(item.cat)}</span>`:''}
          <span class="date-tag">${fmtDate(item.ts)}</span>
          ${item.url&&item.url.startsWith('http')?`<a class="link-tag" href="${esc(item.url)}" target="_blank" rel="noopener">${shortUrl(item.url)}</a>`:''}
        </div>
        ${item.aiLoading?`<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div>AI enriching…</div>`:''}
      </div>
    </div>
    ${(editing||hasNotes)?`<div class="card-notes">
      <div class="notes-label">${item.done?'Your thoughts':'Note'}</div>
      ${editing
        ?`<textarea class="notes-ta" id="nta-${item.id}" placeholder="${item.done?'What did you think? Was it worth it?':'Add a note…'}" onblur="saveNotes('${item.id}')">${esc(item.notes||'')}</textarea>`
        :`<div class="notes-view" onclick="toggleNotes('${item.id}')" title="Click to edit">${esc(item.notes)}</div>`
      }
    </div>`:''}
  </div>`;
}

function setFilter(f){
  activeFilter=f;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function onSearch(v){
  searchQuery=v.trim();
  document.getElementById('search-clear').classList.toggle('vis',searchQuery.length>0);
  renderList(); renderStats();
}

function clearSearch(){
  document.getElementById('search').value='';
  searchQuery='';
  document.getElementById('search-clear').classList.remove('vis');
  renderList(); renderStats();
}

async function addItem(){
  const linkEl =document.getElementById('link-in');
  const titleEl=document.getElementById('title-in');
  const catEl  =document.getElementById('cat-sel');
  const raw    =linkEl.value.trim();
  const mTitle =titleEl.value.trim();
  const cat    =catEl.value;
  if(!raw){ linkEl.focus(); return; }

  const id  =Date.now().toString();
  const item={
    id,url:raw,cat,
    title:mTitle||(raw.startsWith('http')?shortUrl(raw):raw),
    summary:'',notes:'',done:false,aiLoading:true,
    ts:Date.now()
  };

  state.items.unshift(item);
  save();
  linkEl.value=''; titleEl.value='';
  render();
  toast('Added to your Trove ✦');

  try{
    const catList=state.cats.join(', ');
    const prompt=`You are an AI enricher for "Trove", a personal discovery and try-list app.
Given this input from the user: "${raw}"

Return ONLY valid JSON — no markdown fences, no explanation, nothing else:
{"title":"catchy title max 6 words","summary":"one sentence max 15 words describing what this is or why it is interesting","category":"single best matching category from this list: ${catList}"}

Rules:
- title: make it catchy and specific, not generic
- summary: describe what it actually is or what makes it worth trying
- category: pick exactly one from the provided list, the closest match`;

    const res =await fetch(GEMINI_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:.3,maxOutputTokens:250}
      })
    });
    const data=await res.json();
    const text=(data?.candidates?.[0]?.content?.parts?.[0]?.text||'');
    const clean=text.replace(/```json|```/g,'').trim();
    const p=JSON.parse(clean);

    const idx=state.items.findIndex(i=>i.id===id);
    if(idx!==-1){
      if(p.title&&!mTitle)                         state.items[idx].title  =p.title;
      if(p.summary)                                 state.items[idx].summary=p.summary;
      if(p.category&&state.cats.includes(p.category)) state.items[idx].cat =p.category;
      state.items[idx].aiLoading=false;
    }
  }catch(e){
    const idx=state.items.findIndex(i=>i.id===id);
    if(idx!==-1) state.items[idx].aiLoading=false;
  }
  save(); render();
}

function toggleDone(id){
  const item=state.items.find(i=>i.id===id);
  if(!item) return;
  item.done=!item.done;
  save();
  if(item.done){ editingNotes=id; toast('Marked as discovered ✓'); }
  render();
  if(item.done){
    setTimeout(()=>{ const ta=document.getElementById('nta-'+id); if(ta) ta.focus(); },60);
  }
}

function toggleNotes(id){
  editingNotes=editingNotes===id?null:id;
  render();
  if(editingNotes){
    setTimeout(()=>{
      const ta=document.getElementById('nta-'+id);
      if(ta){ ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length); }
    },60);
  }
}

function saveNotes(id){
  const ta  =document.getElementById('nta-'+id);
  const item=state.items.find(i=>i.id===id);
  if(ta&&item) item.notes=ta.value;
  editingNotes=null;
  save(); render();
}

function deleteItem(id){
  if(!confirm('Remove this item from your Trove?')) return;
  state.items=state.items.filter(i=>i.id!==id);
  if(editingNotes===id) editingNotes=null;
  save(); render();
  toast('Removed from Trove');
}

/* CATEGORIES */
function openModal(){
  renderCatsModal();
  document.getElementById('backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('new-cat').focus(),100);
}
function closeModal(){ document.getElementById('backdrop').classList.remove('open'); render(); }
function backdropClick(e){ if(e.target===document.getElementById('backdrop')) closeModal(); }

function renderCatsModal(){
  const el=document.getElementById('cats-list');
  el.innerHTML=state.cats.map(c=>{
    const locked=DEFAULT_CATS.includes(c);
    return `<div class="cat-row">
      <span class="cat-row-name">${esc(c)}${locked?'<span class="cat-locked">(default)</span>':''}</span>
      ${locked?'':`<button class="cat-del" onclick="deleteCat(${JSON.stringify(c)})" title="Remove">✕</button>`}
    </div>`;
  }).join('');
}

function addCat(){
  const inp=document.getElementById('new-cat');
  const val=inp.value.trim();
  if(!val||state.cats.map(c=>c.toLowerCase()).includes(val.toLowerCase())) return;
  state.cats.push(val);
  inp.value='';
  save(); renderCatsModal(); renderCatSelect(); renderFilters();
  toast(`Category "${val}" added`);
}

function deleteCat(name){
  if(DEFAULT_CATS.includes(name)) return;
  state.cats=state.cats.filter(c=>c!==name);
  state.items.forEach(i=>{ if(i.cat===name) i.cat=''; });
  save(); renderCatsModal(); renderCatSelect(); renderFilters();
}

/* BACKUP & RESTORE */
function backupData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url =URL.createObjectURL(blob);
  const a   =document.createElement('a');
  a.href    =url;
  a.download=`trove-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup downloaded ⬇');
}

function triggerRestore(){ document.getElementById('restore-file').click(); }

function restoreData(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.items||!parsed.cats) throw new Error('invalid');
      if(!confirm(`Restore ${parsed.items.length} items? This will replace your current Trove.`)) return;
      state=parsed; save(); render();
      toast(`Restored ${state.items.length} items ✓`);
    }catch(err){ alert('Could not restore: invalid or corrupted backup file.'); }
    input.value='';
  };
  reader.readAsText(file);
}

/* KEYBOARD */
document.getElementById('link-in').addEventListener('keydown',e=>{ if(e.key==='Enter') addItem(); });
document.getElementById('new-cat').addEventListener('keydown',e=>{ if(e.key==='Enter') addCat(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

render();
</script>
</body>
</html>
